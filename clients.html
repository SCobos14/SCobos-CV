<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Clients & Engagements · Samuel Cobos</title>
  <meta name="description" content="Clients and engagements of Samuel Cobos Hurtado. Click a logo to view a description of the work delivered." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="ns-layout">
  <header class="ns-topbar" role="banner">
    <div class="ns-topbar-inner">
      <div class="ns-brand">
        <a class="ns-logo" href="./index.html" style="color:inherit;text-decoration:none">CV Suite</a>
        <span class="ns-divider">·</span>
        <span class="ns-user">Clients</span>
      </div>
      <nav class="ns-nav" aria-label="Primary">
        <a href="./index.html#home" class="ns-tab">Home</a>
        <a href="./index.html#experience" class="ns-tab">Experience</a>
        <a href="./index.html#projects" class="ns-tab">Projects</a>
        <a href="./index.html#skills" class="ns-tab">Skills</a>
        <a href="./index.html#education" class="ns-tab">Education</a>
        <a href="./index.html#contact" class="ns-tab">Contact</a>
        <a href="./clients.html" class="ns-tab is-active">Clients</a>
      </nav>
      <div class="ns-search">
        <input type="search" placeholder="Search clients..." aria-label="Search clients" />
      </div>
    </div>
  </header>

  <main class="container" style="padding:1rem 1rem 3rem">
    <h1 class="section-title" style="margin-top:1rem">Clients & Engagements</h1>
    <p class="muted">Click a logo to open a popup with a short description of the work delivered.</p>

    <section class="clients-grid">
      <button class="client-tile" data-key="Noventiq" aria-label="Noventiq">
        <img src="images/clients/Noventiq.jpeg" alt="Noventiq logo" />
        <span>Noventiq</span>
      </button>
      <button class="client-tile" data-key="BossInfo" aria-label="Boss Info">
        <img src="images/clients/BossInfo.png" alt="Boss Info logo" />
        <span>Boss Info</span>
      </button>
      <button class="client-tile" data-key="Wallbox" aria-label="Wallbox">
        <img src="images/clients/Wallbox.png" alt="Wallbox logo" />
        <span>Wallbox</span>
      </button>
      <button class="client-tile" data-key="Egonzehnder" aria-label="Egon Zehnder">
        <img src="images/clients/Egonzehnder.png" alt="Egon Zehnder logo" />
        <span>Egon Zehnder</span>
      </button>
      <button class="client-tile" data-key="Remira" aria-label="Remira">
        <img src="images/clients/Remira.png" alt="Remira logo" />
        <span>Remira</span>
      </button>
      <button class="client-tile" data-key="ActiveNutrition" aria-label="Active Nutrition">
        <img src="images/clients/ActiveNutrition.png" alt="Active Nutrition logo" />
        <span>Active Nutrition</span>
      </button>
      <button class="client-tile" data-key="Elli" aria-label="Elli">
        <img src="images/clients/Elli.png" alt="Elli logo" />
        <span>Elli</span>
      </button>
      <button class="client-tile" data-key="Pureon" aria-label="Pureon">
        <img src="images/clients/Pureon.png" alt="Pureon logo" />
        <span>Pureon</span>
      </button>
      <button class="client-tile" data-key="Vigience" aria-label="Vigience">
        <img src="images/clients/Vigience.png" alt="Vigience logo" />
        <span>Vigience</span>
      </button>
      <button class="client-tile" data-key="Doodle" aria-label="Doodle">
        <img src="images/clients/Doodle.png" alt="Doodle logo" />
        <span>Doodle</span>
      </button>
      <button class="client-tile" data-key="Purple" aria-label="Purple">
        <img src="images/clients/Purple.jpg" alt="Purple logo" />
        <span>Purple</span>
      </button>
    </section>
  </main>

  <div id="client-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content" role="document">
      <button class="modal-close" aria-label="Close" data-close>×</button>
      <div class="modal-body">
        <h2 id="modal-title">Client</h2>
        <p id="modal-text" class="muted">Description</p>
      </div>
    </div>
  </div>

  <script>
    const descriptions = {
      Noventiq: {
        title: 'Noventiq — NetSuite × Dow Jones',
        text: 'Certified integration with Dow Jones Screening & Monitoring API: automated customer risk validation before transaction processing in NetSuite.'
      },
      BossInfo: {
        title: 'Boss Info — NetSuite Enablement',
        text: 'SuiteScript components and process automation to streamline daily operations. (Details TBD)'
      },
      Wallbox: {
        title: 'Wallbox — Integration Support',
        text: 'NetSuite integration patterns and data flows. (Details TBD)'
      },
      Egonzehnder: {
        title: 'Egon Zehnder — Process Automation',
        text: 'Automation and SuiteScript utilities. (Details TBD)'
      },
      Remira: { title: 'Remira', text: 'Integration and SuiteScript tasks. (Details TBD)' },
      ActiveNutrition: { title: 'Active Nutrition', text: 'Operational dashboards and scripts. (Details TBD)' },
      Elli: { title: 'Elli', text: 'NetSuite workflows and APIs. (Details TBD)' },
      Pureon: { title: 'Pureon', text: 'Data integration and reporting. (Details TBD)' },
      Vigience: { title: 'Vigience', text: 'SuiteScript customization. (Details TBD)' },
      Doodle: { title: 'Doodle', text: 'Automation helpers. (Details TBD)' },
      Purple: { title: 'Purple', text: 'Process improvements. (Details TBD)' }
    };

    const grid = document.querySelector('.clients-grid');
    const modal = document.getElementById('client-modal');
    const modalTitle = document.getElementById('modal-title');
    const modalText = document.getElementById('modal-text');

    function openModal() {
      modal.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    grid.addEventListener('click', (e) => {
      const btn = e.target.closest('.client-tile');
      if (!btn) return;
      const key = btn.getAttribute('data-key');
      const data = descriptions[key];
      if (data) {
        modalTitle.textContent = data.title;
        modalText.textContent = data.text;
      }
      openModal();
    });

    modal.addEventListener('click', (e) => {
      if (e.target.hasAttribute('data-close')) closeModal();
      if (e.target === modal) closeModal();
    });
    window.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
